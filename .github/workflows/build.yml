name: Build Website with Env

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Replace Env Variables
        run: |
          echo "Injecting Telegram secrets..."
          sed -i "s|ENV_BOT_TOKEN|${{ secrets.TELEGRAM_BOT_TOKEN }}|g" index.html
          sed -i "s|ENV_CHANNEL_ID|${{ secrets.TELEGRAM_CHANNEL_ID }}|g" index.html

      - name: Commit Changes (if any)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add index.html
            git commit -m "Inject Telegram env vars [skip ci]"
            git push
          fi
