name: Build Website with Env

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Inject Telegram Secrets
        run: |
          sed -i "s|ENV_BOT_TOKEN|${{ secrets.TELEGRAM_BOT_TOKEN }}|g" index.html
          sed -i "s|ENV_CHANNEL_ID|${{ secrets.TELEGRAM_CHANNEL_ID }}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
