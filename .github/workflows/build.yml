name: Build Website with Env

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Optional: Install any tools if needed
      - name: Replace Env Variables
        run: |
          echo "Replacing env placeholders in index.html..."
          sed -i "s|ENV_BOT_TOKEN|${{ secrets.TELEGRAM_BOT_TOKEN }}|g" index.html
          sed -i "s|ENV_CHANNEL_ID|${{ secrets.TELEGRAM_CHANNEL_ID }}|g" index.html

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Inject Telegram env vars [skip ci]" || echo "No changes"
          git push