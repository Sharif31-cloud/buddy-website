<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Football Intelligence Dashboard</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#eef2f7;margin:0;padding:0;}
header{background:#0f172a;color:white;padding:20px;text-align:center;font-size:26px;font-weight:600;}
.container{max-width:1100px;margin:auto;padding:30px;}
.card{background:white;padding:25px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.08);margin-bottom:25px;}
.controls{display:flex;gap:15px;flex-wrap:wrap;}
select{padding:10px;border-radius:6px;border:1px solid #ccc;min-width:200px;}
.buttons{margin-top:15px;display:flex;flex-wrap:wrap;gap:10px;}
button{padding:10px 16px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer;font-weight:500;}
button:hover{background:#1e40af;}
.result{margin-top:20px;padding:20px;background:#f8fafc;border-radius:8px;}
.stat{background:white;padding:10px;border-radius:6px;margin:6px 0;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
table{border-collapse:collapse;width:100%;}
td, th{border:1px solid #ccc;padding:8px;text-align:center;}
.highlight{background:#ffeaa7;}
</style>
</head>
<body>

<header>⚽ Football Intelligence Dashboard</header>

<div class="container">
<div class="card">

<div class="controls">
<select id="competition"></select>

<script>
// JS version of COMPETITIONS
const COMPETITIONS = {
  "PL": "Premier League",
  "PD": "La Liga",
  "BL1": "Bundesliga",
  "CL": "Champions League",
  "DED": "Eredivisie",
  "BSA": "Campeonato Brasileiro Série A",
  "FL1": "Ligue 1",
  "ELC": "Championship",
  "PPL": "Polish Ekstraklasa",
  "SA": "Serie A",
  "WC": "World Cup"
};

const compSelect = document.getElementById("competition");
compSelect.innerHTML = ""; // clear existing options
for (const key in COMPETITIONS){
  compSelect.innerHTML += `<option value="${key}">${COMPETITIONS[key]}</option>`;
}
</script>

<select id="homeTeam" placeholder="Home Team"></select>
<select id="awayTeam" placeholder="Away Team"></select>
</div>

<div class="buttons">
<button onclick="prediction()">🧠 Prediction</button>
<button onclick="topScorers()">🥇 Top Scorers</button>
<button onclick="standings()">📊 Standings</button>
<button onclick="attackStrength()">⚔ Attack Strength</button>
<button onclick="defenseStrength()">🛡 Defense Strength</button>
</div>

<div id="analysis" class="result"></div>
</div>
</div>

<script>

// -------------------------
// MULTI-FIREBASE CONFIG
// -------------------------

const appsConfig = {
  core: { databaseURL:"https://football-core-1b911-default-rtdb.firebaseio.com" },
  players: { databaseURL:"https://football-players-3f2c7-default-rtdb.firebaseio.com" },
  analytics: { databaseURL:"https://football-analytics-29b4a-default-rtdb.firebaseio.com" }
};

const firebaseApps = {};
for (const key in appsConfig){
  firebaseApps[key] = firebase.initializeApp(appsConfig[key], key);
}

// Database refs
const dbCore = firebaseApps.core.database();
const dbPlayers = firebaseApps.players.database();
const dbAnalytics = firebaseApps.analytics.database();

// -------------------------
// UTILS
// -------------------------

function sanitize(name){
  return name.replace(/[.$#[\]/]/g,"_");
}

function poisson(lambda){
  let L=Math.exp(-lambda), p=1, k=0;
  do{ k++; p*=Math.random(); } while(p>L);
  return k-1;
}

// -------------------------
// LOAD TEAMS
// -------------------------

const competition = document.getElementById("competition");
const homeTeam = document.getElementById("homeTeam");
const awayTeam = document.getElementById("awayTeam");

competition.addEventListener("change", loadTeams);

async function loadTeams(){
  const comp = competition.value;
  const snap = await dbCore.ref("teams/"+comp).once("value");
  const data = snap.val() || {};
  homeTeam.innerHTML = awayTeam.innerHTML = "";
  Object.values(data).forEach(t=>{
    homeTeam.innerHTML += `<option>${t.name}</option>`;
    awayTeam.innerHTML += `<option>${t.name}</option>`;
  });
}

loadTeams();

// -------------------------
// LOAD TEAM STATS
// -------------------------

async function loadTeamStats(){
  const snap = await dbAnalytics.ref("team_strength").once("value");
  return snap.val() || {};
}

// -------------------------
// PREDICTION
// -------------------------

async function prediction(){
  const home = homeTeam.value;
  const away = awayTeam.value;
  const stats = await loadTeamStats();
  const ha = stats[sanitize(home)]?.attack || 1;
  const aa = stats[sanitize(away)]?.attack || 1;
  const sims = 10000;
  let hw=0, dr=0, aw=0;
  for(let i=0;i<sims;i++){
    const hg=poisson(ha), ag=poisson(aa);
    if(hg>ag) hw++; else if(hg<ag) aw++; else dr++;
  }
  analysis.innerHTML=`
    <h3>${home} vs ${away}</h3>
    <div class="stat">Home Win: ${Math.round(hw/sims*100)}%</div>
    <div class="stat">Draw: ${Math.round(dr/sims*100)}%</div>
    <div class="stat">Away Win: ${Math.round(aw/sims*100)}%</div>
  `;
}

// -------------------------
// TOP SCORERS
// -------------------------

async function topScorers(){
  const comp = competition.value;
  const snap = await dbPlayers.ref("top_scorers/"+comp).once("value");
  const scorers = snap.val() || [];
  let html = "<h3>🥇 League Top Scorers</h3>";
  scorers.slice(0,10).forEach(s=>{
    html += `<div class="stat">${s.player} (${s.team}) — ${s.goals} goals</div>`;
  });
  analysis.innerHTML = html;
}

// -------------------------
// STANDINGS
// -------------------------

async function standings(){
  const comp = competition.value;
  const snap = await dbCore.ref(`standings/${comp}/2026`).once("value");
  const table = snap.val() || [];
  let html = "<h3>📊 League Table</h3><table><thead><tr><th>Pos</th><th>Team</th><th>Pts</th><th>Played</th><th>GF</th><th>GA</th></tr></thead><tbody>";
  table.forEach(t=>{
    const highlight = (t.team===homeTeam.value||t.team===awayTeam.value)?"highlight":"";
    html += `<tr class="${highlight}"><td>${t.position}</td><td>${t.team}</td><td>${t.points}</td><td>${t.played}</td><td>${t.goalsFor}</td><td>${t.goalsAgainst}</td></tr>`;
  });
  html += "</tbody></table>";
  analysis.innerHTML = html;
}

// -------------------------
// ATTACK & DEFENSE
// -------------------------

async function attackStrength(){
  const stats = await loadTeamStats();
  const home = sanitize(homeTeam.value);
  const away = sanitize(awayTeam.value);
  analysis.innerHTML = `
    <h3>⚔ Attack Strength</h3>
    <div class="stat">${homeTeam.value}: ${Math.round(stats[home]?.attack || 0)}</div>
    <div class="stat">${awayTeam.value}: ${Math.round(stats[away]?.attack || 0)}</div>
  `;
}

async function defenseStrength(){
  const stats = await loadTeamStats();
  const home = sanitize(homeTeam.value);
  const away = sanitize(awayTeam.value);
  analysis.innerHTML = `
    <h3>🛡 Defense Strength</h3>
    <div class="stat">${homeTeam.value}: ${Math.round(stats[home]?.defense || 0)}</div>
    <div class="stat">${awayTeam.value}: ${Math.round(stats[away]?.defense || 0)}</div>
  `;
}

</script>
</body>
</html>
