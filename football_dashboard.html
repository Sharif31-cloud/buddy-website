<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Football Intelligence Dashboard</title>

<link rel="icon" type="image/png" href="icon.png">
  <link rel="shortcut icon" href="icon.ico">
  <link rel="apple-touch-icon" href="icon.png">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#eef2f7;margin:0;padding:0;}
header{background:#0f172a;color:white;padding:20px;text-align:center;font-size:26px;font-weight:600;}
.container{max-width:1100px;margin:auto;padding:30px;}
.card{background:white;padding:25px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.08);margin-bottom:25px;}
.controls{display:flex;gap:15px;flex-wrap:wrap;}
select{padding:10px;border-radius:6px;border:1px solid #ccc;min-width:200px;}
.buttons{margin-top:15px;display:flex;flex-wrap:wrap;gap:10px;}
button{padding:10px 16px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer;font-weight:500;}
button:hover{background:#1e40af;}
.result{margin-top:20px;padding:20px;background:#f8fafc;border-radius:8px;}
.stat{background:white;padding:10px;border-radius:6px;margin:6px 0;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
table{border-collapse:collapse;width:100%;}
td, th{border:1px solid #ccc;padding:8px;text-align:center;}
.highlight{background:#ffeaa7;}
</style>
</head>
<body>

<header>⚽ Football Intelligence Dashboard</header>

<div class="container">
<div class="card">

<div class="controls">
<select id="competition"></select>
<select id="homeTeam" placeholder="Home Team"></select>
<select id="awayTeam" placeholder="Away Team"></select>
</div>

<div class="buttons">
<button onclick="prediction()">🧠 Prediction</button>
<button onclick="topScorers()">🥇 Top Scorers</button>
<button onclick="standings()">📊 Standings</button>
<button onclick="attackStrength()">⚔ Attack Strength</button>
<button onclick="defenseStrength()">🛡 Defense Strength</button>
<button onclick="showPlayers()">👥 Players</button>
</div>

<div id="analysis" class="result"></div>
</div>
</div>

<script>
// -------------------------
// COMPETITIONS
// -------------------------
const COMPETITIONS = {
  "PL": "Premier League",
  "PD": "La Liga",
  "BL1": "Bundesliga",
  "CL": "Champions League",
  "DED": "Eredivisie",
  "BSA": "Campeonato Brasileiro Série A",
  "FL1": "Ligue 1",
  "ELC": "Championship",
  "PPL": "Polish Ekstraklasa",
  "SA": "Serie A",
  "WC": "World Cup"
};

const compSelect = document.getElementById("competition");
compSelect.innerHTML = "";
for (const key in COMPETITIONS){
  compSelect.innerHTML += `<option value="${key}">${COMPETITIONS[key]}</option>`;
}

// -------------------------
// MULTI-FIREBASE CONFIG
// -------------------------
const appsConfig = {
  core: { databaseURL:"https://football-core-1b911-default-rtdb.firebaseio.com" },
  players: { databaseURL:"https://football-players-3f2c7-default-rtdb.firebaseio.com" },
  analytics: { databaseURL:"https://football-analytics-29b4a-default-rtdb.firebaseio.com" }
};

const firebaseApps = {};
for (const key in appsConfig){
  firebaseApps[key] = firebase.initializeApp(appsConfig[key], key);
}

const dbCore = firebaseApps.core.database();
const dbPlayers = firebaseApps.players.database();
const dbAnalytics = firebaseApps.analytics.database();

// -------------------------
// UTILS
// -------------------------
function sanitize(name){
  return name.replace(/[.$#[\]/]/g,"_");
}

function poisson(lambda){
  let L = Math.exp(-lambda), p = 1, k = 0;
  do { k++; p *= Math.random(); } while(p > L);
  return k - 1;
}

// -------------------------
// LOAD TEAMS
// -------------------------
const competition = document.getElementById("competition");
const homeTeam = document.getElementById("homeTeam");
const awayTeam = document.getElementById("awayTeam");

competition.addEventListener("change", loadTeams);

async function loadTeams(){
  const comp = competition.value;
  const snap = await dbCore.ref("teams/"+comp).once("value");
  const data = snap.val() || {};
  homeTeam.innerHTML = awayTeam.innerHTML = "";
  Object.values(data).forEach(t=>{
    homeTeam.innerHTML += `<option>${t.name}</option>`;
    awayTeam.innerHTML += `<option>${t.name}</option>`;
  });
}

loadTeams();

// -------------------------
// LOAD TEAM STATS
// -------------------------
async function loadTeamStats(){
  const snap = await dbAnalytics.ref("team_strength").once("value");
  return snap.val() || {};
}

// -------------------------
// LOAD MATCHES
// -------------------------
async function loadMatches(){
  const snap = await dbCore.ref("matches/2026").once("value");
  const data = snap.val() || {};
  // convert to array of objects
  return Object.values(data);
}

// -------------------------
// PREDICTION (FULL)
// -------------------------
async function prediction(){
  const home = homeTeam.value;
  const away = awayTeam.value;
  const stats = await loadTeamStats();

  if(!stats[sanitize(home)] || !stats[sanitize(away)]){
    analysis.innerHTML = "⚠ Stats missing for one of the teams";
    return;
  }

  // ------------------------------
  // Base attack & defense
  // ------------------------------
  const ha = stats[sanitize(home)].attack;
  const hd = stats[sanitize(home)].defense;
  const aa = stats[sanitize(away)].attack;
  const ad = stats[sanitize(away)].defense;

  let baseHome = ha / (ha + ad);
  let baseAway = aa / (aa + hd);

  // ------------------------------
  // Home advantage
  // ------------------------------
  const homeAdv = 0.1;
  baseHome *= 1 + homeAdv;

  // ------------------------------
  // ELO ratings
  // ------------------------------
  const eloSnap = await dbAnalytics.ref("elo_ratings").once("value");
  const elo = eloSnap.val() || {};
  const hr = elo[sanitize(home)] || 1500;
  const ar = elo[sanitize(away)] || 1500;
  const eloFactor = (hr - ar) / 400;
  baseHome *= 1 + 0.5 * eloFactor;
  baseAway *= 1 - 0.5 * eloFactor;

  // ------------------------------
  // Head-to-head
  // ------------------------------
  const h2hSnap = await dbAnalytics.ref("head_to_head").once("value");
  const h2h = h2hSnap.val() || {};
  const keyHA = `${sanitize(home)}_${sanitize(away)}`;
  const keyAH = `${sanitize(away)}_${sanitize(home)}`;
  const h2hHome = h2h[keyHA] || 0;
  const h2hAway = h2h[keyAH] || 0;
  const totalH2H = h2hHome + h2hAway;
  if(totalH2H>0){
    const h2hFactor = (h2hHome - h2hAway)/totalH2H;
    baseHome *= 1 + 0.1*h2hFactor;
    baseAway *= 1 - 0.1*h2hFactor;
  }

  // ------------------------------
  // League positions
  // ------------------------------
  const standingsSnap = await dbCore.ref(`standings/PL/2026`).once("value");
  const standings = standingsSnap.val() || [];
  const homePos = standings.find(t=>sanitize(t.team)===sanitize(home))?.position || null;
  const awayPos = standings.find(t=>sanitize(t.team)===sanitize(away))?.position || null;
  if(homePos && awayPos){
    const posFactor = (awayPos - homePos)/20;
    baseHome *= 1 + 0.1*posFactor;
    baseAway *= 1 - 0.1*posFactor;
  }

  // ------------------------------
  // Recent form (last 5 matches)
  // ------------------------------
  const matches = await loadMatches();
  function recentForm(team){
    const teamMatches = matches.filter(m=>m.homeTeam===team || m.awayTeam===team);
    const last5 = teamMatches.slice(-5);
    let scored=0, conceded=0;
    last5.forEach(r=>{
      if(r.homeTeam===team){ scored+=r.homeScore; conceded+=r.awayScore; }
      else { scored+=r.awayScore; conceded+=r.homeScore; }
    });
    if(last5.length===0) return [1,1];
    return [scored/last5.length, conceded/last5.length];
  }
  const [rHomeScored, rHomeConceded] = recentForm(home);
  const [rAwayScored, rAwayConceded] = recentForm(away);

  // ------------------------------
  // Dynamic expected goals
  // ------------------------------
  // Use recent goals + attack/defense stats
  const expHomeGoals = Math.max(0.5, (rHomeScored * baseHome + rAwayConceded * 0.5));
  const expAwayGoals = Math.max(0.5, (rAwayScored * baseAway + rHomeConceded * 0.5));

  // ------------------------------
  // Injuries
  // ------------------------------
  const injuriesSnap = await dbPlayers.ref("injuries").once("value");
  const injuries = injuriesSnap.val() || {};
  const homeInjuries = Object.values(injuries).filter(p=>p.team.name===home).length;
  const awayInjuries = Object.values(injuries).filter(p=>p.team.name===away).length;
  if(homeInjuries + awayInjuries>0){
    const injuryFactor = (awayInjuries-homeInjuries)/Math.max(homeInjuries+awayInjuries,1);
    expHomeGoals *= 1 + 0.05*injuryFactor;
    expAwayGoals *= 1 - 0.05*injuryFactor;
  }

  // ------------------------------
  // SIMULATION
  // ------------------------------
  const sims = 10000;
  let hw=0, dr=0, aw=0;
  let homeGoalsTotal=0, awayGoalsTotal=0;
  let scoreCounter={};

  for(let i=0;i<sims;i++){
    const hg = poisson(expHomeGoals);
    const ag = poisson(expAwayGoals);
    homeGoalsTotal += hg;
    awayGoalsTotal += ag;
    if(hg>ag) hw++;
    else if(hg<ag) aw++;
    else dr++;
    const key=`${hg}-${ag}`;
    scoreCounter[key] = (scoreCounter[key] || 0)+1;
  }

  const avgHome = (homeGoalsTotal/sims).toFixed(2);
  const avgAway = (awayGoalsTotal/sims).toFixed(2);
  const mostLikelyScore = Object.keys(scoreCounter).reduce((a,b)=>scoreCounter[a]>scoreCounter[b]?a:b);

  analysis.innerHTML = `
    <h3>${home} vs ${away}</h3>
    <div class="stat">Home Win: ${Math.round(hw/sims*100)}%</div>
    <div class="stat">Draw: ${Math.round(dr/sims*100)}%</div>
    <div class="stat">Away Win: ${Math.round(aw/sims*100)}%</div>
    <div class="stat">Average Score: ${avgHome} - ${avgAway}</div>
    <div class="stat">Most Likely Score: ${mostLikelyScore}</div>
  `;
}
// -------------------------
// TOP SCORERS, STANDINGS, ATTACK/DEFENSE (unchanged)
// -------------------------
async function topScorers(){
  const comp = competition.value;
  const snap = await dbPlayers.ref("top_scorers/"+comp).once("value");
  const scorers = snap.val() || [];
  let html = "<h3>🥇 League Top Scorers</h3>";
  scorers.slice(0,10).forEach(s=>{
    html += `<div class="stat">${s.player} (${s.team}) — ${s.goals} goals</div>`;
  });
  analysis.innerHTML = html;
}

async function standings(){
  const comp = competition.value;
  const snap = await dbCore.ref(`standings/${comp}/2026`).once("value");
  const table = snap.val() || [];
  let html = "<h3>📊 League Table</h3><table><thead><tr><th>Pos</th><th>Team</th><th>Pts</th><th>Played</th><th>GF</th><th>GA</th></tr></thead><tbody>";
  table.forEach(t=>{
    const highlight = (t.team===homeTeam.value||t.team===awayTeam.value)?"highlight":"";
    html += `<tr class="${highlight}"><td>${t.position}</td><td>${t.team}</td><td>${t.points}</td><td>${t.played}</td><td>${t.goalsFor}</td><td>${t.goalsAgainst}</td></tr>`;
  });
  html += "</tbody></table>";
  analysis.innerHTML = html;
}

async function attackStrength(){
  const stats = await loadTeamStats();
  const home = sanitize(homeTeam.value);
  const away = sanitize(awayTeam.value);
  analysis.innerHTML = `
    <h3>⚔ Attack Strength</h3>
    <div class="stat">${homeTeam.value}: ${Math.round(stats[home]?.attack || 0)}</div>
    <div class="stat">${awayTeam.value}: ${Math.round(stats[away]?.attack || 0)}</div>
  `;
}

async function defenseStrength(){
  const stats = await loadTeamStats();
  const home = sanitize(homeTeam.value);
  const away = sanitize(awayTeam.value);
  analysis.innerHTML = `
    <h3>🛡 Defense Strength</h3>
    <div class="stat">${homeTeam.value}: ${Math.round(stats[home]?.defense || 0)}</div>
    <div class="stat">${awayTeam.value}: ${Math.round(stats[away]?.defense || 0)}</div>
  `;
}

// -------------------------
// LOAD TEAM PLAYERS
// -------------------------
// -------------------------
// LOAD TEAM PLAYERS
// -------------------------
async function loadTeamPlayers(team, comp) {
    // 1️⃣ Get team ID from core DB
    const snapTeams = await dbCore.ref("teams/" + comp).once("value");
    const teamsData = snapTeams.val() || {};
    let teamId = null;
    Object.entries(teamsData).forEach(([tid, t]) => {
        if (t.name.toLowerCase() === team.toLowerCase()) teamId = tid;
    });
    if (!teamId) return [];

    // 2️⃣ Get players from players DB
    const snapPlayers = await dbPlayers.ref(`players/${comp}/${teamId}`).once("value");
    const playersData = snapPlayers.val() || [];

    // 3️⃣ Flatten players
    return playersData.map(p => ({
        name: p.name || "Unknown",
        position: p.position || "UNK",
        nationality: p.nationality || "Unknown",
        dob: p.dob || "Unknown"
    }));
}

// -------------------------
// SHOW PLAYERS TABLES SIDE BY SIDE
// -------------------------
async function showPlayers() {
    const home = homeTeam.value;
    const away = awayTeam.value;
    const comp = competition.value;

    if (!home || !away) {
        analysis.innerHTML = "<div class='stat'>⚠ Please select both Home and Away teams first.</div>";
        return;
    }

    const homePlayers = await loadTeamPlayers(home, comp);
    const awayPlayers = await loadTeamPlayers(away, comp);

    // -------------------------
    // Granular position order for football lineup
    // -------------------------
const positionMap = {
    "Goalkeeper": "GK",
    "Right-Back": "RB",
    "Left-Back": "LB",
    "Centre-Back": "CB",
    "Defence": "DEF",
    "Defensive Midfield": "DM",
    "Central Midfield": "CM",
    "Midfield": "MID",
    "Attacking Midfield": "AM",
    "Right Winger": "RW",
    "Left Winger": "LW",
    "Centre-Forward": "CF",
    "Offence": "FWD"
}; 

const positionOrder = {
    GK:0,
    RB:1,
    LB:2,
    CB:3,
    DEF:4,
    DM:5,
    CM:6,
    AM:7,
    MID:8,
    RW:9,
    LW:10,
    FWD:12,
    CF:11,
    UNK:13
};

    const positionColors = {
        "Goalkeeper": "#d4efdf",    // Green
        "Left-Back": "#f9f59f",     // Yellow
        "Right-Back": "#f9f59f",
        "Centre-Back": "#f9f59f",
        "Defence": "#f9f59f",
        "Defensive Midfield": "#f5a623", // Orange
        "Central Midfield": "#f5a623",
        "Midfield": "#f5a623",
        "Attacking Midfield": "#f5a623",
        "Right Winger": "#f5b7b1",  // Red
        "Left Winger": "#f5b7b1",
        "Centre-Forward": "#f5b7b1",
        "Offence": "#f5b7b1",
        "UNK": "#d7dbdd"            // Grey
    };

    // -------------------------
    // Sort players by position and then alphabetically
    // -------------------------
function sortPlayers(players){
    return players.sort((a,b)=>{

        const posA = positionMap[a.position] || "UNK";
        const posB = positionMap[b.position] || "UNK";

        return (positionOrder[posA] ?? 13) - (positionOrder[posB] ?? 13);
    });
}

    // -------------------------
    // Render table for one team
    // -------------------------
    function renderTable(teamName, players) {
        let tableHtml = `<div style="flex:1">
            <h3>👥 ${teamName} Players (${players.length})</h3>
            <table>
                <thead><tr><th>Position</th><th>Player</th></tr></thead>
                <tbody>`;
        players.forEach(p => {
            tableHtml += `<tr>
                <td style="background:${positionColors[p.position] || '#d7dbdd'}">${p.position}</td>
                <td>${p.name}</td>
            </tr>`;
        });
        tableHtml += "</tbody></table></div>";
        return tableHtml;
    }

    // -------------------------
    // Combine home and away tables side by side
    // -------------------------
    analysis.innerHTML = `<div style="display:flex;gap:50px;">
        ${renderTable(home, sortPlayers(homePlayers))}
        ${renderTable(away, sortPlayers(awayPlayers))}
    </div>`;
}
</script>
</html>
